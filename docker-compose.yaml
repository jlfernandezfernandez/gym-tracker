# Local development stack built from source.
# App and MCP bind to localhost; PostgreSQL is private.

x-app-environment: &app-environment
  ENVIRONMENT: ${ENVIRONMENT:-development}
  DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:?Set POSTGRES_USER}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:?Set POSTGRES_DB}
  CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8000}
  TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
  COACH_API_KEY: ${COACH_API_KEY:-}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  EXERCISE_DATASET_VERSION: ${EXERCISE_DATASET_VERSION:-v1.0.0}

services:
  db:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?Set POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:?Set POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  app-init:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["python", "-m", "scripts.bootstrap"]
    restart: "no"
    environment: *app-environment
    volumes:
      - exercise_data:/data/exercise-datasets
    depends_on:
      db:
        condition: service_healthy

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${APP_BIND:-127.0.0.1}:${APP_PORT:-8000}:8000"
    environment: *app-environment
    volumes:
      - exercise_data:/data/exercise-datasets
    depends_on:
      app-init:
        condition: service_completed_successfully
      db:
        condition: service_healthy

  mcp:
    build:
      context: .
      dockerfile: Dockerfile.mcp
    restart: unless-stopped
    ports:
      - "${MCP_BIND:-127.0.0.1}:${MCP_PORT:-8001}:8001"
    environment:
      MCP_PORT: 8001
      GYM_TRACKER_API_BASE: http://app:8000/api
      GYM_TRACKER_APP_BASE: ${PUBLIC_APP_URL:?Set PUBLIC_APP_URL}
      GYM_TRACKER_COACH_KEY: ${COACH_API_KEY:-}
    depends_on:
      app:
        condition: service_healthy

volumes:
  postgres_data:
  exercise_data:
