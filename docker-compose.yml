# =============================================================================
# gym-tracker — Docker Compose (desarrollo local)
# =============================================================================
# Replica la topología de producción para desarrollo: PostgreSQL 18 + app + MCP.
# Los datos sobreviven a `docker compose down` gracias a los volúmenes.
# Para empezar de cero: `docker compose down -v`.
# =============================================================================

services:
  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gym_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gym_pass}
      POSTGRES_DB: ${POSTGRES_DB:-gym_tracker}
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8000}:8000"
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-development}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-gym_user}:${POSTGRES_PASSWORD:-gym_pass}@postgres:5432/${POSTGRES_DB:-gym_tracker}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8000}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      COACH_API_KEY: ${COACH_API_KEY:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      EXERCISE_DATASET_VERSION: ${EXERCISE_DATASET_VERSION:-v1.0.0}
    volumes:
      - exercise_data:/data/exercise-datasets
    depends_on:
      app-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy

  app-init:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["python", "-m", "scripts.bootstrap"]
    restart: "no"
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-development}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-gym_user}:${POSTGRES_PASSWORD:-gym_pass}@postgres:5432/${POSTGRES_DB:-gym_tracker}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8000}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      COACH_API_KEY: ${COACH_API_KEY:-}
      EXERCISE_DATASET_VERSION: ${EXERCISE_DATASET_VERSION:-v1.0.0}
    volumes:
      - exercise_data:/data/exercise-datasets
    depends_on:
      postgres:
        condition: service_healthy

  # Agente-agnostic MCP endpoint. Hermes, Claude, Codex, etc. can connect to
  # http://localhost:8001/mcp from the host without being part of this stack.
  mcp:
    build:
      context: .
      dockerfile: Dockerfile.mcp
    restart: unless-stopped
    ports:
      - "127.0.0.1:${MCP_PORT:-8001}:8001"
    environment:
      MCP_PORT: 8001
      GYM_TRACKER_API_BASE: http://app:8000/api
      GYM_TRACKER_APP_BASE: ${PUBLIC_APP_URL:-http://localhost:8000}
      GYM_TRACKER_COACH_KEY: ${COACH_API_KEY:-}
    depends_on:
      app:
        condition: service_healthy

volumes:
  postgres_data:
  exercise_data:
