# =============================================================================
# gym-tracker — Docker Compose (desarrollo local)
# =============================================================================
# La misma topología lógica que Coolify: PostgreSQL + Garage + app.
# Los servicios internos no publican puertos al host salvo la app.
#
# Arranque:
#   docker compose up -d --build
#   docker compose logs -f app
#
# Los datos sobreviven a `docker compose down` gracias a los volúmenes.
# Para empezar de cero: `docker compose down -v`.
# =============================================================================

services:
  postgres:
    image: postgres:16-alpine
    container_name: gym-tracker-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gym_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gym_pass}
      POSTGRES_DB: ${POSTGRES_DB:-gym_tracker}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  garage:
    build:
      context: .
      dockerfile: Dockerfile.garage
    container_name: gym-tracker-garage
    restart: unless-stopped
    environment:
      GARAGE_ALLOW_WORLD_READABLE_SECRETS: "false"
      RUST_LOG: ${GARAGE_LOG_LEVEL:-garage=info}
    volumes:
      - garage_meta:/var/lib/garage/meta
      - garage_data:/var/lib/garage/data
      - garage_snapshots:/var/lib/garage/snapshots
      - garage_config:/etc/garage
    entrypoint: []
    command: ["/usr/local/bin/garage-start.sh"]
    healthcheck:
      test: ["CMD", "/garage", "-c", "/etc/garage/garage.toml", "status"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s

  garage-init:
    build:
      context: .
      dockerfile: Dockerfile.garage
    container_name: gym-tracker-garage-init
    restart: "no"
    depends_on:
      garage:
        condition: service_healthy
    volumes:
      - garage_config:/etc/garage:ro
      - garage_meta:/var/lib/garage/meta:ro
      - garage_credentials:/run/garage
    entrypoint: []
    command: ["/usr/local/bin/garage-init.sh"]

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gym-tracker-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8000}:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-gym_user}:${POSTGRES_PASSWORD:-gym_pass}@postgres:5432/${POSTGRES_DB:-gym_tracker}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      COACH_API_KEY: ${COACH_API_KEY:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      S3_ENDPOINT: http://garage:3900
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-}
      S3_BUCKET: gym-tracker-media
      S3_REGION: garage
    volumes:
      - garage_credentials:/run/garage:ro
    depends_on:
      postgres:
        condition: service_healthy
      garage-init:
        condition: service_completed_successfully

volumes:
  postgres_data:
  garage_meta:
  garage_data:
  garage_snapshots:
  garage_config:
  garage_credentials:
