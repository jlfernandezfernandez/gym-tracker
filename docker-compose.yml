# =============================================================================
# gym-tracker — Docker Compose (desarrollo local)
# =============================================================================
# Replica la topología de producción para desarrollo: PostgreSQL 18 + MinIO + app + MCP.
# Los datos sobreviven a `docker compose down` gracias a los volúmenes.
# Para empezar de cero: `docker compose down -v`.
# =============================================================================

services:
  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gym_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gym_pass}
      POSTGRES_DB: ${POSTGRES_DB:-gym_tracker}
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-gym-tracker-access-key}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-gym-tracker-secret-key-change-me}
    volumes:
      - minio_data:/data
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    command: ["server", "/data", "--console-address", ":9001"]

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8000}:8000"
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-development}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-gym_user}:${POSTGRES_PASSWORD:-gym_pass}@postgres:5432/${POSTGRES_DB:-gym_tracker}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8000}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      COACH_API_KEY: ${COACH_API_KEY:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-gym-tracker-access-key}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-gym-tracker-secret-key-change-me}
      S3_BUCKET: ${S3_BUCKET:-gym-tracker-media}
      S3_REGION: ${S3_REGION:-us-east-1}
    depends_on:
      app-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy

  app-init:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["python", "-m", "scripts.bootstrap"]
    restart: "no"
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-development}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-gym_user}:${POSTGRES_PASSWORD:-gym_pass}@postgres:5432/${POSTGRES_DB:-gym_tracker}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8000}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      COACH_API_KEY: ${COACH_API_KEY:-}
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-gym-tracker-access-key}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-gym-tracker-secret-key-change-me}
      S3_BUCKET: ${S3_BUCKET:-gym-tracker-media}
      S3_REGION: ${S3_REGION:-us-east-1}
      EXERCISE_DATASET_REPOSITORY: ${EXERCISE_DATASET_REPOSITORY:-jlfernandezfernandez/exercises-dataset-es}
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started

  # Agente-agnostic MCP endpoint. Hermes, Claude, Codex, etc. can connect to
  # http://localhost:8001/mcp from the host without being part of this stack.
  mcp:
    build:
      context: .
      dockerfile: Dockerfile.mcp
    restart: unless-stopped
    ports:
      - "127.0.0.1:${MCP_PORT:-8001}:8001"
    environment:
      MCP_PORT: 8001
      GYM_TRACKER_API_BASE: http://app:8000/api
      GYM_TRACKER_APP_BASE: ${PUBLIC_APP_URL:-http://localhost:8000}
      GYM_TRACKER_COACH_KEY: ${COACH_API_KEY:-}
    depends_on:
      app:
        condition: service_healthy

volumes:
  postgres_data:
  minio_data:
