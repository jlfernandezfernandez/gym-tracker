# Production stack for a Docker host or one Coolify Compose resource.
# The App is public; MCP is bound to localhost and storage services stay private.

x-app-environment: &app-environment
  ENVIRONMENT: ${ENVIRONMENT:-production}
  DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:?Set POSTGRES_USER}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:?Set POSTGRES_DB}
  CORS_ORIGINS: ${CORS_ORIGINS:?Set CORS_ORIGINS}
  TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:?Set TELEGRAM_BOT_TOKEN}
  COACH_API_KEY: ${COACH_API_KEY:?Set COACH_API_KEY}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  S3_ENDPOINT: http://minio:9000
  S3_ACCESS_KEY: ${S3_ACCESS_KEY:?Set S3_ACCESS_KEY}
  S3_SECRET_KEY: ${S3_SECRET_KEY:?Set S3_SECRET_KEY}
  S3_BUCKET: ${S3_BUCKET:-gym-tracker-media}
  S3_REGION: ${S3_REGION:-us-east-1}
  EXERCISE_DATASET_REPOSITORY: ${EXERCISE_DATASET_REPOSITORY:-jlfernandezfernandez/exercises-dataset-es}

services:
  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?Set POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:?Set POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:?Set S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:?Set S3_SECRET_KEY}
    volumes:
      - minio_data:/data
    command: ["server", "/data", "--console-address", ":9001"]
    healthcheck:
      test: ["CMD-SHELL", "minio --version >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s

  app-init:
    image: ghcr.io/jlfernandezfernandez/gym-tracker:${GYM_TRACKER_VERSION:-latest}
    command: ["python", "-m", "scripts.bootstrap"]
    restart: "no"
    environment: *app-environment
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy

  app:
    image: ghcr.io/jlfernandezfernandez/gym-tracker:${GYM_TRACKER_VERSION:-latest}
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8000}:8000"
    environment: *app-environment
    depends_on:
      app-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy

  mcp:
    image: ghcr.io/jlfernandezfernandez/gym-tracker-mcp:${GYM_TRACKER_VERSION:-latest}
    restart: unless-stopped
    ports:
      - "127.0.0.1:${MCP_PORT:-8001}:8001"
    environment:
      MCP_PORT: 8001
      GYM_TRACKER_API_BASE: http://app:8000/api
      GYM_TRACKER_APP_BASE: ${PUBLIC_APP_URL:?Set PUBLIC_APP_URL}
      GYM_TRACKER_COACH_KEY: ${COACH_API_KEY:?Set COACH_API_KEY}
    depends_on:
      app:
        condition: service_healthy

volumes:
  postgres_data:
  minio_data:
