# Production stack for a Docker host or one Coolify Compose resource.
# The App is public; MCP is bound to localhost and PostgreSQL stays private.

x-app-environment: &app-environment
  ENVIRONMENT: production
  DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:?Set POSTGRES_USER}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:?Set POSTGRES_DB}
  CORS_ORIGINS: ${CORS_ORIGINS:?Set CORS_ORIGINS}
  TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:?Set TELEGRAM_BOT_TOKEN}
  COACH_API_KEY: ${COACH_API_KEY:?Set COACH_API_KEY}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  EXERCISE_DATASET_VERSION: ${EXERCISE_DATASET_VERSION:-v1.0.0}

services:
  db:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?Set POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:?Set POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  app-init:
    image: ghcr.io/jlfernandezfernandez/gym-tracker:${GYM_TRACKER_VERSION:-latest}
    command: ["python", "-m", "scripts.bootstrap"]
    restart: "no"
    environment: *app-environment
    volumes:
      - exercise_data:/data/exercise-datasets
    depends_on:
      db:
        condition: service_healthy

  app:
    image: ghcr.io/jlfernandezfernandez/gym-tracker:${GYM_TRACKER_VERSION:-latest}
    restart: unless-stopped
    expose:
      - "8000"
    environment: *app-environment
    volumes:
      - exercise_data:/data/exercise-datasets
    networks:
      - default
      - coolify
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.gym-tracker-app.rule=Host(`${APP_PUBLIC_FQDN:?Set APP_PUBLIC_FQDN}`)"
      - "traefik.http.routers.gym-tracker-app.entrypoints=http"
      - "traefik.http.services.gym-tracker-app.loadbalancer.server.port=8000"
    depends_on:
      app-init:
        condition: service_completed_successfully
      db:
        condition: service_healthy

  mcp:
    image: ghcr.io/jlfernandezfernandez/gym-tracker-mcp:${GYM_TRACKER_VERSION:-latest}
    restart: unless-stopped
    expose:
      - "8001"
    environment:
      MCP_PORT: 8001
      GYM_TRACKER_API_BASE: http://app:8000/api
      GYM_TRACKER_APP_BASE: ${PUBLIC_APP_URL:?Set PUBLIC_APP_URL}
      GYM_TRACKER_COACH_KEY: ${COACH_API_KEY:?Set COACH_API_KEY}
    networks:
      - default
      - coolify
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.gym-tracker-mcp.rule=Host(`${MCP_PUBLIC_FQDN:?Set MCP_PUBLIC_FQDN}`)"
      - "traefik.http.routers.gym-tracker-mcp.entrypoints=http"
      - "traefik.http.services.gym-tracker-mcp.loadbalancer.server.port=8001"
    depends_on:
      app:
        condition: service_healthy

volumes:
  postgres_data:
  exercise_data:

networks:
  coolify:
    external: true
