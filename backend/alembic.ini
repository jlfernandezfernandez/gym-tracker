# Alembic config for gym-tracker.
# Migrations run against the same DATABASE_URL as the app (async URL).
# The async URL (postgresql+asyncpg://) can't be used by alembic's sync
# env directly, so we strip the +asyncpg driver here.

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os

# No sqlalchemy.url here — env.py pulls DATABASE_URL from the environment.


[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S