name: Release images

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      version:
        description: Release tag to publish (for example v1.1.0)
        required: true
        type: string

env:
  RELEASE_VERSION: ${{ inputs.version || github.ref_name }}

permissions:
  contents: read
  packages: write

jobs:
  images:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata for App
        id: app-meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,value=${{ env.RELEASE_VERSION }},pattern={{version}}
            type=semver,value=${{ env.RELEASE_VERSION }},pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ !contains(env.RELEASE_VERSION, '-') }}

      - name: Build and push App
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.app-meta.outputs.tags }}
          labels: ${{ steps.app-meta.outputs.labels }}

      - name: Docker metadata for MCP
        id: mcp-meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}-mcp
          tags: |
            type=semver,value=${{ env.RELEASE_VERSION }},pattern={{version}}
            type=semver,value=${{ env.RELEASE_VERSION }},pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ !contains(env.RELEASE_VERSION, '-') }}

      - name: Build and push MCP
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.mcp
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.mcp-meta.outputs.tags }}
          labels: ${{ steps.mcp-meta.outputs.labels }}

  deploy:
    name: Deploy stable release to production
    needs: images
    if: ${{ !contains(inputs.version || github.ref_name, '-') }}
    uses: ./.github/workflows/deploy-production.yml
    secrets: inherit
