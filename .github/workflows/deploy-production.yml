name: Deploy production

on:
  workflow_dispatch:

permissions: {}

concurrency:
  group: gym-tracker-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy with Coolify
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 20
    steps:
      - name: Trigger deployment
        id: trigger
        env:
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
          COOLIFY_WEBHOOK: ${{ secrets.COOLIFY_WEBHOOK }}
        run: |
          set -Eeuo pipefail
          response=$(curl \
            --silent \
            --show-error \
            --fail-with-body \
            --retry 3 \
            --request GET \
            --header "Authorization: Bearer ${COOLIFY_TOKEN}" \
            "${COOLIFY_WEBHOOK}")

          deployment_uuid=$(RESPONSE="$response" python -c '
          import json, os
          payload = json.loads(os.environ["RESPONSE"])
          deployments = payload.get("deployments", []) if isinstance(payload, dict) else []
          uuid = payload.get("deployment_uuid") if isinstance(payload, dict) else None
          uuid = uuid or (deployments[0].get("deployment_uuid") if deployments else None)
          if not uuid:
              raise SystemExit("Coolify response did not contain a deployment UUID")
          print(uuid)
          ')

          api_base=$(WEBHOOK="$COOLIFY_WEBHOOK" python -c '
          import os
          from urllib.parse import urlsplit
          parsed = urlsplit(os.environ["WEBHOOK"])
          print(f"{parsed.scheme}://{parsed.netloc}/api/v1")
          ')

          echo "deployment_uuid=${deployment_uuid}" >> "$GITHUB_OUTPUT"
          echo "api_base=${api_base}" >> "$GITHUB_OUTPUT"
          echo "Coolify deployment queued: ${deployment_uuid}"

      - name: Wait for Coolify
        env:
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
          API_BASE: ${{ steps.trigger.outputs.api_base }}
          DEPLOYMENT_UUID: ${{ steps.trigger.outputs.deployment_uuid }}
        run: |
          set -Eeuo pipefail
          for attempt in {1..90}; do
            status=$(curl \
              --silent \
              --show-error \
              --fail-with-body \
              --header "Authorization: Bearer ${COOLIFY_TOKEN}" \
              "${API_BASE}/deployments/${DEPLOYMENT_UUID}" \
              | python -c 'import json, sys; print(json.load(sys.stdin)["status"])')

            echo "Coolify status: ${status}"
            case "$status" in
              finished)
                exit 0
                ;;
              failed|cancelled)
                echo "Deployment ${DEPLOYMENT_UUID} ended with status ${status}" >&2
                exit 1
                ;;
            esac
            sleep 10
          done

          echo "Timed out waiting for deployment ${DEPLOYMENT_UUID}" >&2
          exit 1

      - name: Verify production readiness
        run: >-
          curl
          --silent
          --show-error
          --fail-with-body
          --retry 12
          --retry-all-errors
          --retry-delay 5
          https://gym.jordixlab.com/ready
