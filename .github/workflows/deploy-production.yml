name: Deploy production

on:
  workflow_call:
  workflow_dispatch:

permissions: {}

concurrency:
  group: gym-tracker-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy with Coolify
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 20
    steps:
      - name: Trigger deployment
        id: trigger
        env:
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
          COOLIFY_WEBHOOK: ${{ secrets.COOLIFY_WEBHOOK }}
        run: |
          set -Eeuo pipefail
          response_file=$(mktemp)
          headers_file=$(mktemp)
          trap 'rm -f "$response_file" "$headers_file"' EXIT

          http_status=$(curl \
            --silent \
            --show-error \
            --retry 3 \
            --request GET \
            --user-agent "gym-tracker-deploy/1.0" \
            --oauth2-bearer "$COOLIFY_TOKEN" \
            --output "$response_file" \
            --dump-header "$headers_file" \
            --write-out "%{http_code}" \
            "${COOLIFY_WEBHOOK}")

          if [[ ! "$http_status" =~ ^2 ]]; then
            RESPONSE_FILE="$response_file" HEADERS_FILE="$headers_file" python -c '
          import json, os
          from pathlib import Path
          headers = Path(os.environ["HEADERS_FILE"]).read_text()
          body = Path(os.environ["RESPONSE_FILE"]).read_text()
          parsed_headers = {}
          for line in headers.splitlines():
              if ":" in line:
                  key, value = line.split(":", 1)
                  parsed_headers[key.lower()] = value.strip()
          try:
              message = json.loads(body).get("message", "JSON response without message")
          except (json.JSONDecodeError, AttributeError):
              message = "non-JSON response"
          print("server={} cf-ray={} content-type={} message={}".format(parsed_headers.get("server", "unknown"), parsed_headers.get("cf-ray", "none"), parsed_headers.get("content-type", "unknown"), str(message)[:200]))
          '
            echo "Coolify deploy request failed with HTTP ${http_status}" >&2
            exit 1
          fi

          response=$(RESPONSE_FILE="$response_file" python -c 'import os; from pathlib import Path; print(Path(os.environ["RESPONSE_FILE"]).read_text())')
          rm -f "$response_file" "$headers_file"
          trap - EXIT

          deployment_uuid=$(RESPONSE="$response" python -c '
          import json, os
          payload = json.loads(os.environ["RESPONSE"])
          deployments = payload.get("deployments", []) if isinstance(payload, dict) else []
          uuid = payload.get("deployment_uuid") if isinstance(payload, dict) else None
          uuid = uuid or (deployments[0].get("deployment_uuid") if deployments else None)
          if not uuid:
              raise SystemExit("Coolify response did not contain a deployment UUID")
          print(uuid)
          ')

          api_base=$(WEBHOOK="$COOLIFY_WEBHOOK" python -c '
          import os
          from urllib.parse import urlsplit
          parsed = urlsplit(os.environ["WEBHOOK"])
          print(f"{parsed.scheme}://{parsed.netloc}/api/v1")
          ')

          echo "deployment_uuid=${deployment_uuid}" >> "$GITHUB_OUTPUT"
          echo "api_base=${api_base}" >> "$GITHUB_OUTPUT"
          echo "Coolify deployment queued: ${deployment_uuid}"

      - name: Wait for Coolify
        env:
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
          API_BASE: ${{ steps.trigger.outputs.api_base }}
          DEPLOYMENT_UUID: ${{ steps.trigger.outputs.deployment_uuid }}
        run: |
          set -Eeuo pipefail
          for attempt in {1..90}; do
            status=$(curl \
              --silent \
              --show-error \
              --fail-with-body \
              --user-agent "gym-tracker-deploy/1.0" \
              --oauth2-bearer "$COOLIFY_TOKEN" \
              "${API_BASE}/deployments/${DEPLOYMENT_UUID}" \
              | python -c 'import json, sys; print(json.load(sys.stdin)["status"])')

            echo "Coolify status: ${status}"
            case "$status" in
              finished)
                exit 0
                ;;
              failed|cancelled)
                echo "Deployment ${DEPLOYMENT_UUID} ended with status ${status}" >&2
                exit 1
                ;;
            esac
            sleep 10
          done

          echo "Timed out waiting for deployment ${DEPLOYMENT_UUID}" >&2
          exit 1

      - name: Verify production readiness
        run: >-
          curl
          --silent
          --show-error
          --fail
          --output /dev/null
          --user-agent "gym-tracker-deploy/1.0"
          --retry 12
          --retry-all-errors
          --retry-delay 5
          https://gym.jordixlab.com/ready
