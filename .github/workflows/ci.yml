name: CI
on:
  push: {branches: [main]}
  pull_request:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # lfs: false a propósito — el build no necesita los GIFs reales
      # (punteros LFS bastan) y cada checkout LFS gasta ~136MB de cuota.
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.13"}
      - name: Install deps
        run: pip install -r backend/requirements.txt mcp
      - name: Syntax + imports
        run: |
          python -m compileall -q backend mcp
          cd backend && python -c "import main, telegram_auth, schemas, models"
          python -m unittest test_session_integrity.py
      - name: Frontend build
        run: cd frontend && npm ci && npm run build
      - name: Docker builds
        run: docker build -t gym-tracker .
      - run: docker build -f Dockerfile.mcp -t gym-tracker-mcp .
      - name: Compose smoke
        run: |
          docker compose up -d --build
          for attempt in {1..30}; do curl -fsS http://localhost:8000/ready && curl -fsS http://localhost:8001/ready && break; sleep 2; done
          curl -fsS http://localhost:8000/health
          curl -fsS http://localhost:8001/health
      - name: Stop Compose
        if: always()
        run: docker compose down -v
