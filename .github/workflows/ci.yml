name: CI
on:
  push: {branches: [main]}
  pull_request:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # lfs: false a propósito — el build no necesita los GIFs reales
      # (punteros LFS bastan) y cada checkout LFS gasta ~136MB de cuota.
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.13"}
      - uses: astral-sh/setup-uv@v6
        with: {enable-cache: true}
      - name: Install locked backend
        working-directory: backend
        run: uv sync --locked
      - name: Backend checks
        working-directory: backend
        run: |
          uv run ruff format --check .
          uv run ruff check .
          uv run pyright
          uv run pytest -q
          ENVIRONMENT=development DATABASE_URL=postgresql+asyncpg://x:x@localhost/x uv run alembic heads
      - name: Compile MCP
        run: python -m compileall -q mcp run_mcp.py
      - name: Frontend build
        run: cd frontend && npm ci && npm run build
      - name: Docker builds
        run: docker build -t gym-tracker .
      - run: docker build -f Dockerfile.mcp -t gym-tracker-mcp .
      - name: Compose smoke
        run: |
          docker compose up -d --build
          for attempt in {1..30}; do curl -fsS http://localhost:8000/ready && curl -fsS http://localhost:8001/ready && break; sleep 2; done
          curl -fsS http://localhost:8000/health
          curl -fsS http://localhost:8001/health
      - name: Stop Compose
        if: always()
        run: docker compose down -v
