name: CI
on:
  push: {branches: [main]}
  pull_request:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with: {python-version: "3.13"}
      - uses: astral-sh/setup-uv@v8
        with: {enable-cache: true}
      - name: Install locked backend
        working-directory: apps/api
        run: uv sync --locked
      - name: Backend checks
        working-directory: apps/api
        run: |
          uv run ruff format --check .
          uv run ruff check .
          uv run pyright
          uv run pytest -q
          ENVIRONMENT=development DATABASE_URL=postgresql+asyncpg://x:x@localhost/x uv run alembic heads
      - name: Compile MCP
        run: python -m compileall -q apps/mcp
      - name: Frontend build
        run: cd apps/miniapp && npm ci && npm run build
      - name: Docker builds
        run: docker build -t gym-tracker .
      - run: docker build -f Dockerfile.mcp -t gym-tracker-mcp .
      - name: Compose smoke
        run: |
          docker compose --env-file .env.example up -d --build
          ready=false
          for attempt in {1..30}; do
            if curl -fsS http://localhost:8000/ready && curl -fsS http://localhost:8001/ready; then
              ready=true
              break
            fi
            sleep 2
          done
          test "$ready" = true
          curl -fsS http://localhost:8000/health
          curl -fsS http://localhost:8001/health
      - name: Stop Compose
        if: always()
        run: docker compose --env-file .env.example down -v
